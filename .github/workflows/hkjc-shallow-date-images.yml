name: HKJC shallow date image aliases

on:
  workflow_dispatch:
  schedule:
    # UTC time. Runs every 30 minutes from 16:00 to 21:30 Asia/Taipei.
    - cron: '0,30 8-13 * * *'

permissions:
  contents: write

jobs:
  create-shallow-aliases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy today's HKJC PNG files to shallow date-stamped filenames
        shell: bash
        env:
          TZ: Asia/Taipei
        run: |
          set -euo pipefail

          slotDate="$(TZ=Asia/Taipei date +%Y%m%d)"
          srcDir="screenshots/hkjc/daily/${slotDate}"
          dstDir="screenshots/hkjc"

          fixturesSrc="${srcDir}/fixtures.png"
          newsSrc="${srcDir}/news.png"
          fixturesDst="${dstDir}/fixtures-${slotDate}.png"
          newsDst="${dstDir}/news-${slotDate}.png"

          echo "slotDate=${slotDate}"
          echo "fixturesSrc=${fixturesSrc}"
          echo "newsSrc=${newsSrc}"

          if [ ! -f "${fixturesSrc}" ] || [ ! -f "${newsSrc}" ]; then
            echo "Today's HKJC daily PNG files are not ready yet. Nothing to copy."
            exit 0
          fi

          mkdir -p "${dstDir}"
          cp "${fixturesSrc}" "${fixturesDst}"
          cp "${newsSrc}" "${newsDst}"

          echo "Created shallow PNG aliases:"
          ls -l "${fixturesDst}" "${newsDst}"

      - name: Commit shallow date-stamped PNG files
        shell: bash
        env:
          TZ: Asia/Taipei
        run: |
          set -euo pipefail

          slotDate="$(TZ=Asia/Taipei date +%Y%m%d)"
          fixturesDst="screenshots/hkjc/fixtures-${slotDate}.png"
          newsDst="screenshots/hkjc/news-${slotDate}.png"

          if [ ! -f "${fixturesDst}" ] || [ ! -f "${newsDst}" ]; then
            echo "No shallow PNG files were created. Skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${fixturesDst}" "${newsDst}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add HKJC shallow screenshots ${slotDate}"
          git push
