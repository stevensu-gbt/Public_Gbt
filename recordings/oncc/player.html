<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCC Replay</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
#info {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 2;
  background: rgba(0,0,0,.55);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 14px;
}
video {
  width: 100%;
  height: 100vh;
  object-fit: contain;
}
</style>
</head>
<body>
<div id="info">ONCC录像回放<br>状态：检测中...</div>

<video id="video" controls autoplay playsinline>
  <source id="webm" src="latest.webm?cb=" type="video/webm">
  <source id="mp4" src="latest.mp4?cb=" type="video/mp4">
</video>

<script>
const cb = Date.now();
document.getElementById('webm').src = 'latest.webm?cb=' + cb;
document.getElementById('mp4').src = 'latest.mp4?cb=' + cb;

const video = document.getElementById('video');
const info = document.getElementById('info');

video.addEventListener('loadedmetadata', () => {
  info.innerHTML = 'ONCC录像回放<br>状态：✅ 可播放<br>长度：' + Math.floor(video.duration) + ' 秒';
});

video.addEventListener('error', () => {
  info.innerHTML = 'ONCC录像回放<br>状态：⚠️ 当前录像不可用';
});
</script>
</body>
</html>
